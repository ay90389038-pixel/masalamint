    <style>
        .feedback-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 40px; }
        .feedback-card { background: var(--light); padding: 30px; border-radius: 12px; box-shadow: var(--shadow); }

    <header>

                <a href="story.html">Story</a>

                <a href="join-us.html">Join Us</a>
                <a href="login.html" class="btn-login">Login</a>
            </nav>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <h2 class="section-title">Regional Community Feedback</h2>
            <div class="feedback-container">
                <div class="feedback-card">
                    <div class="stars">★★★★★</div>
                    <p>"The items match city standards perfectly. Complete culinary hygiene consistency."</p>
